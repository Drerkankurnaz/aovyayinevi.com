services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aov_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_URL: http://localhost:8082
      ASSET_URL: http://localhost:8082
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: aovyayinevi
      DB_USERNAME: aovyayinevi
      DB_PASSWORD: REDACTED_LOCAL_SECRET
    depends_on:
      - db
    networks:
      - aov

  webserver:
    image: nginx:stable-alpine
    container_name: aov_nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - aov

  db:
    image: mysql:8.0
    container_name: aov_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aovyayinevi
      MYSQL_USER: aovyayinevi
      MYSQL_PASSWORD: REDACTED_LOCAL_SECRET
      MYSQL_ROOT_PASSWORD: REDACTED_ROOT_SECRET
    ports:
      - "33062:3306"
    volumes:
      - aov_db_data:/var/lib/mysql
    networks:
      - aov

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: aov_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
    ports:
      - "8092:80"
    depends_on:
      - db
    networks:
      - aov

networks:
  aov:
    driver: bridge

volumes:
  aov_db_data:
